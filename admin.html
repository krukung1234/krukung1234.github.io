<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin | เพิ่มเกม</title>
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>
  <main class="panel">
    <section id="loginBox" class="card">
      <h1>➕ เพิ่มเกมใหม่</h1>
      <label>รหัส Admin</label>
      <input id="password" type="password" placeholder="ใส่รหัส">
      <button onclick="login()">เข้าสู่ระบบ</button>
      <p class="note">รหัสเริ่มต้น: <b>vip69</b> เปลี่ยนได้ที่ไฟล์ <b>js/config.js</b> ตรง ADMIN_PASSWORD</p>
    </section>

    <section id="adminBox" class="card hidden">
      <div class="head">
        <h1>🎮 จัดการเกม</h1>
        <button class="ghost" onclick="logout()">ออกจากระบบ</button>
      </div>

      <form id="gameForm">
        <input type="hidden" id="id">

        <label>ชื่อเกม</label>
        <input id="title" required placeholder="เช่น AR Sudoku">

        <label>รายละเอียดสั้น ๆ</label>
        <textarea id="description" required placeholder="อธิบายเกมสั้น ๆ"></textarea>

        <label>หมวดหมู่</label>
        <select id="category">
          <option>สิ่งแวดล้อม</option>
          <option>คณิตศาสตร์</option>
          <option>ภาษาไทย</option>
          <option>ภาษาอังกฤษ</option>
          <option>วิทยาศาสตร์</option>
          <option>คอมพิวเตอร์</option>
          <option>AI</option>
          <option>AR</option>
          <option>อื่น ๆ</option>
        </select>

        <label>ลิงก์รูปภาพ</label>
        <input id="image" placeholder="เช่น https://... หรือ images/cover.png">

        <label>ลิงก์เกม</label>
        <input id="link" placeholder="เช่น games/ar-sudoku/ หรือ #">

        <label>สถานะ</label>
        <select id="status">
          <option value="open">เปิดเล่น</option>
          <option value="soon">เร็ว ๆ นี้</option>
          <option value="hidden">ซ่อน</option>
        </select>

        <div class="row">
          <button type="submit">💾 บันทึกเกม</button>
          <button type="button" class="warn" onclick="resetForm()">ล้างฟอร์ม</button>
        </div>
      </form>

      <h2>รายการเกม</h2>
      <div id="list" class="list"></div>
    </section>
  </main>

  <script src="js/config.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
