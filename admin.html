<!DOCTYPE html><html lang="th"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin | Krukung Game Hub</title>
<link rel="stylesheet" href="css/admin.css">
</head><body>
<div id="adminLogin" class="login-screen">
  <div class="login-card">
    <div class="login-logo">🔐</div>
    <h1>Admin</h1>
    <p>ระบบจัดการเกม ครูกุ้งสอนไอที</p>
    <input id="adminPassword" type="password" placeholder="รหัส Admin">
    <button id="adminLoginBtn">เข้าสู่ระบบ</button>
    <small id="adminError"></small>
  </div>
</div>

<div id="adminPanel" class="hidden">
<header class="admin-top">
  <div><h1>🎮 จัดการเกม</h1><p>เพิ่มเกมด้วยชื่อโฟลเดอร์ เช่น <b>ar-sudoku</b> ระบบจะสร้างลิงก์ให้อัตโนมัติ</p></div>
  <div class="top-actions"><a href="index.html" target="_blank">ดูหน้าเว็บ</a><button id="logoutAdmin">ออกจากระบบ</button></div>
</header>

<main class="admin-container">
  <section class="stats"><div><b id="totalGames">0</b><span>เกมทั้งหมด</span></div><div><b id="openGames">0</b><span>เปิดเล่น</span></div><div><b id="soonGames">0</b><span>เร็ว ๆ นี้</span></div></section>
  <section class="card form-card">
    <h2>➕ เพิ่ม / แก้ไขเกม</h2>
    <form id="gameForm">
      <input type="hidden" id="id">
      <div class="grid2"><label>ชื่อเกม<input id="title" required placeholder="เช่น AR Sudoku"></label><label>หมวดหมู่<select id="category"></select></label></div>
      <label>รายละเอียดสั้น ๆ<textarea id="description" maxlength="90" placeholder="ไม่เกิน 90 ตัวอักษร เพื่อให้การ์ดสวยเท่ากัน"></textarea><small><span id="descCount">0</span>/90 ตัวอักษร</small></label>
      <div class="grid2"><label>รูปปก / ลิงก์รูป<input id="image" placeholder="เว้นว่างได้ ระบบจะใช้ games/ชื่อโฟลเดอร์/cover.png"></label><label>ชื่อโฟลเดอร์เกม<input id="folder" required placeholder="เช่น ar-sudoku"></label></div>
      <div class="grid2"><label>สถานะ<select id="status"><option value="open">เปิดเล่น</option><option value="soon">เร็ว ๆ นี้</option><option value="hidden">ซ่อน</option></select></label><label>ลิงก์ที่ระบบสร้าง<input id="linkPreview" readonly placeholder="games/.../index.html"></label></div>
      <div class="form-actions"><button type="submit">💾 บันทึกเกม</button><button type="button" id="resetBtn">ล้างฟอร์ม</button></div>
    </form>
  </section>
  <section class="card"><div class="list-head"><h2>รายการเกม</h2><input id="adminSearch" placeholder="ค้นหาเกม..."></div><div id="gameList" class="game-list"></div></section>
</main>
</div>
<script src="js/config.js"></script><script src="js/admin.js"></script>
</body></html>
