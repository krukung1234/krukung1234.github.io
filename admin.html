<!DOCTYPE html>
<html lang="th">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Admin | เพิ่มเกม</title><style>*{box-sizing:border-box}body{margin:0;font-family:"Prompt","Sarabun",Arial,sans-serif;background:linear-gradient(135deg,#d9f6ff,#fff4c7,#ffe2f2);color:#17324d}.box{width:min(760px,94%);margin:30px auto;background:white;border-radius:28px;padding:24px;box-shadow:0 14px 32px rgba(0,0,0,.15)}h1{text-align:center;color:#1d4ed8}.row{margin:14px 0}label{display:block;font-weight:900;margin-bottom:7px}input,select,textarea{width:100%;padding:13px 15px;border:2px solid #dbeafe;border-radius:14px;font-size:16px}textarea{min-height:86px}.btn{border:0;border-radius:999px;background:linear-gradient(135deg,#2563eb,#06b6d4);color:white;padding:14px 24px;font-size:18px;font-weight:900;cursor:pointer}.note{background:#fff7cc;border-radius:16px;padding:14px;font-weight:700;line-height:1.6}.hidden{display:none}a{color:#1d4ed8;font-weight:900}</style></head>
<body><div class="box"><h1>➕ เพิ่มเกมใหม่</h1><div id="login"><div class="row"><label>รหัส Admin</label><input id="password" type="password" placeholder="ใส่รหัส"></div><button class="btn" onclick="login()">เข้าสู่ระบบ</button><p class="note">รหัสตั้งต้นคือ <b>1234</b> เปลี่ยนได้ในไฟล์นี้ตรง ADMIN_PASSWORD</p></div>
<div id="admin" class="hidden"><p><a href="index.html">← กลับหน้าเว็บ</a></p><form id="gameForm" method="POST" target="hiddenFrame"><input type="hidden" name="action" value="add"><div class="row"><label>ชื่อเกม</label><input name="title" required placeholder="เช่น AR Cyber Quest"></div><div class="row"><label>คำอธิบายสั้น ๆ</label><textarea name="desc" required placeholder="เช่น เรียนรู้อุปกรณ์คอมพิวเตอร์พื้นฐาน"></textarea></div><div class="row"><label>หมวดหมู่</label><select name="category"><option>คณิตศาสตร์</option><option>ภาษา</option><option>คอมพิวเตอร์</option><option>สิ่งแวดล้อม</option><option>AI</option><option>ฝึกสมอง</option><option>สื่อการสอน</option></select></div><div class="row"><label>ลิงก์รูปภาพ</label><input name="image" placeholder="เช่น cyber.png หรือ https://.../image.png"></div><div class="row"><label>ลิงก์เกม</label><input name="link" placeholder="เช่น cyber-quest/ หรือ https://..."></div><div class="row"><label>สถานะ</label><select name="status"><option value="open">เปิดเล่น</option><option value="soon">เร็ว ๆ นี้</option></select></div><button class="btn" type="submit">💾 บันทึกเกม</button></form><iframe name="hiddenFrame" style="display:none"></iframe><p id="msg" class="note hidden">บันทึกแล้วค่ะ รอ 5-10 วินาที แล้วกลับไปหน้าเว็บ กด Ctrl+F5</p></div></div>
<script>const ADMIN_PASSWORD="1234"; const APPS_SCRIPT_URL="PUT_YOUR_APPS_SCRIPT_WEB_APP_URL_HERE"; function login(){if(document.getElementById('password').value===ADMIN_PASSWORD){document.getElementById('login').classList.add('hidden');document.getElementById('admin').classList.remove('hidden');document.getElementById('gameForm').action=APPS_SCRIPT_URL}else alert('รหัสไม่ถูกต้อง')}document.getElementById('gameForm').addEventListener('submit',()=>{setTimeout(()=>document.getElementById('msg').classList.remove('hidden'),800)})</script></body></html>
