<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin | Krukung Game Hub V13</title>
  <link rel="stylesheet" href="css/admin.css" />
</head>
<body>
  <main class="wrap">
    <section id="loginBox" class="login-card">
      <div class="lock">🔐</div>
      <h1>Admin</h1>
      <p>ระบบจัดการเกม ครูกุ้งสอนไอที</p>
      <input id="password" type="password" placeholder="รหัส Admin" />
      <button onclick="login()">เข้าสู่ระบบ</button>
    </section>

    <section id="adminBox" class="hidden">
      <header class="top">
        <div><h1>🎮 Krukung Game Hub</h1><p>เพิ่มเกมโดยใช้โฟลเดอร์ใน <b>games/ชื่อโฟลเดอร์/index.html</b></p></div>
        <button class="ghost" onclick="logout()">ออกจากระบบ</button>
      </header>
      <section class="stats"><div><b id="totalGames">0</b><span>เกมทั้งหมด</span></div><div><b id="openGames">0</b><span>เปิดเล่น</span></div><div><b id="soonGames">0</b><span>เร็ว ๆ นี้</span></div></section>
      <section class="panel">
        <h2>➕ เพิ่มเกมใหม่</h2>
        <form id="gameForm">
          <input type="hidden" id="id" />
          <div class="grid2"><label>ชื่อเกม<input id="title" required placeholder="เช่น AR Sudoku" /></label><label>หมวดหมู่<select id="category"><option>สิ่งแวดล้อม</option><option>คณิตศาสตร์</option><option>ภาษาไทย</option><option>ภาษาอังกฤษ</option><option>วิทยาศาสตร์</option><option>คอมพิวเตอร์</option><option>AI</option><option>AR</option><option>ฝึกสมอง</option><option>อื่น ๆ</option></select></label></div>
          <label>รายละเอียดสั้น ๆ<textarea id="description" required placeholder="อธิบายเกมสั้น ๆ"></textarea></label>
          <div class="grid2"><label>รูปปก / ลิงก์รูป <small>(เว้นว่างได้ ถ้าในโฟลเดอร์มี cover.png)</small><input id="image" placeholder="เว้นว่างได้ หรือใส่ games/ar-sudoku/cover.png" /></label><label>ชื่อโฟลเดอร์เกม<input id="folder" required placeholder="เช่น ar-sudoku" /></label></div>
          <p class="hint">ระบบจะสร้างลิงก์ให้อัตโนมัติ: <b id="previewLink">games/ชื่อโฟลเดอร์/index.html</b><br>รูปปกอัตโนมัติ: <b id="previewImage">games/ชื่อโฟลเดอร์/cover.png</b></p>
          <div class="grid2"><label>สถานะ<select id="status"><option value="open">เปิดเล่น</option><option value="soon">เร็ว ๆ นี้</option><option value="hidden">ซ่อน</option></select></label><label>ลิงก์เกมที่ระบบสร้างไว้<input id="link" readonly placeholder="สร้างอัตโนมัติ" /></label></div>
          <div class="actions"><button type="submit">💾 บันทึกเกม</button><button type="button" class="warn" onclick="resetForm()">ล้างฟอร์ม</button></div>
        </form>
      </section>
      <section class="panel"><div class="list-head"><h2>รายการเกม</h2><input id="adminSearch" placeholder="ค้นหาเกม..." /></div><div id="list" class="list"></div></section>
    </section>
  </main>
  <script src="js/config.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
