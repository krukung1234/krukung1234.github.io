<!DOCTYPE html><html lang="th"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>กำลังเปิดเกม...</title><style>html,body{margin:0;height:100%;font-family:system-ui,'Sarabun',sans-serif;background:#eef6ff}.bar{height:56px;background:#fff;display:flex;align-items:center;gap:12px;padding:0 18px;box-shadow:0 8px 30px #0001}.bar a{background:#6c3be8;color:#fff;text-decoration:none;padding:10px 18px;border-radius:999px;font-weight:800}iframe{width:100%;height:calc(100% - 56px);border:0}.login{min-height:100%;display:grid;place-items:center}.box{background:#fff;border-radius:24px;padding:28px;box-shadow:0 20px 60px #0002;text-align:center}.box input{padding:14px;border:1px solid #ddd;border-radius:14px}.box button{padding:14px 22px;border:0;border-radius:14px;background:#6c3be8;color:#fff;font-weight:800}</style></head><body>
<div id="lock" class="login"><div class="box"><h2>🔐 สำหรับสมาชิก VIP</h2><p>กรอกรหัสก่อนเปิดเกม</p><input id="pw" type="password" placeholder="รหัส VIP"> <button onclick="login()">เข้าเล่น</button></div></div>
<div id="player" style="display:none;height:100%"><div class="bar"><a href="index.html">← กลับหน้าเว็บ</a><b id="title">กำลังเปิดเกม</b></div><iframe id="frame"></iframe></div>
<script src="js/config.js"></script><script>
function ok(){return localStorage.getItem('vip_ok')==='1'}
function login(){if(document.getElementById('pw').value===APP_CONFIG.VIP_PASSWORD){localStorage.setItem('vip_ok','1');show()}else alert('รหัสไม่ถูกต้อง')}
function show(){document.getElementById('lock').style.display='none';document.getElementById('player').style.display='block';const q=new URLSearchParams(location.search);const url=q.get('url')||'';const title=q.get('title')||'เกม';document.getElementById('title').textContent=title;document.getElementById('frame').src=url||'index.html'}
if(ok()) show();
</script></body></html>
