<!DOCTYPE html><html lang="th"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>เล่นเกม</title><style>html,body{margin:0;height:100%;font-family:sans-serif;background:#0f1020}.bar{height:54px;background:#fff;display:flex;align-items:center;gap:12px;padding:0 16px;box-shadow:0 4px 18px rgba(0,0,0,.15);position:relative;z-index:2}.bar a{text-decoration:none;background:#6d38e8;color:#fff;border-radius:18px;padding:9px 14px;font-weight:800}iframe{width:100%;height:calc(100% - 54px);border:0;background:#fff}</style></head><body><div class="bar"><a href="index.html">← กลับหน้าเกม</a><b id="title">กำลังเปิดเกม...</b></div><iframe id="frame"></iframe><script>const p=new URLSearchParams(location.search);const url=p.get('url')||p.get('game')||'';document.getElementById('title').textContent=url||'ไม่พบลิงก์เกม';if(url)document.getElementById('frame').src=url;</script></body></html>
