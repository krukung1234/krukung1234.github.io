<!DOCTYPE html><html lang="th"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>เล่นเกม</title><style>html,body{margin:0;height:100%;font-family:system-ui,'Sarabun',sans-serif;background:#111}.bar{height:52px;background:#fff;display:flex;align-items:center;gap:10px;padding:0 14px;box-shadow:0 3px 14px #0002}.bar a{color:#6d28d9;text-decoration:none;font-weight:800}.bar b{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.loader{color:white;text-align:center;padding:50px}iframe{width:100%;height:calc(100vh - 52px);border:0;background:white}</style></head><body><div class="bar"><a href="index.html">← กลับ</a><b id="title">กำลังโหลดเกม...</b></div><div id="loader" class="loader">กำลังเปิดเกม...</div><iframe id="frame" class="hidden" allow="camera; microphone; fullscreen; autoplay" sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-modals"></iframe><script src="js/config.js"></script><script>const qs=new URLSearchParams(location.search);const id=qs.get('id');const frame=document.getElementById('frame');const loader=document.getElementById('loader');function norm(p){return (p||'').replace(/^\.\//,'').replace(/^\//,'')}async function run(){await window.firebaseReady;if(!id){loader.textContent='ไม่พบรหัสเกม';return}const doc=await window.gamesRef.doc(id).get();if(!doc.exists){loader.textContent='ไม่พบเกมนี้';return}const g=doc.data();document.getElementById('title').textContent=g.title||'เล่นเกม';if(g.fileMap&&Object.keys(g.fileMap).length){let entry=g.entryFile||'index.html';let url=g.fileMap[entry]||g.fileMap['index.html']||Object.values(g.fileMap)[0];let html=await (await fetch(url)).text();Object.entries(g.fileMap).forEach(([path,u])=>{const esc=path.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');html=html.replace(new RegExp(`(src|href)=(['"])${esc}\\2`,'g'),`$1=$2${u}$2`);html=html.replace(new RegExp(`(src|href)=(['"])${norm(path)}\\2`,'g'),`$1=$2${u}$2`);});frame.srcdoc=html;}else{frame.src=g.link||g.gameUrl||'#'}loader.style.display='none';frame.classList.remove('hidden')}run().catch(e=>{console.error(e);loader.textContent='เปิดเกมไม่สำเร็จ กรุณาตรวจสอบไฟล์ index.html';});</script></body></html>
