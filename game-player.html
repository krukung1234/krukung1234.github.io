<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>กำลังเปิดเกม...</title>
  <style>
    html,body{margin:0;height:100%;font-family:system-ui,'Noto Sans Thai',sans-serif;background:#0f172a;color:#fff}#bar{height:54px;display:flex;align-items:center;gap:12px;padding:0 16px;background:rgba(15,23,42,.92);box-sizing:border-box}#bar b{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.btn{color:#fff;text-decoration:none;background:#7c3aed;padding:9px 14px;border-radius:999px;margin-left:auto}iframe{width:100%;height:calc(100vh - 54px);border:0;background:#fff}.center{display:grid;place-items:center;height:calc(100vh - 54px);text-align:center;padding:20px}.spin{font-size:42px;animation:b 1s infinite linear}@keyframes b{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
  <div id="bar"><b id="title">🎮 กำลังเปิดเกม...</b><a class="btn" href="index.html">กลับหน้าหลัก</a></div>
  <div id="loading" class="center"><div><div class="spin">⚙️</div><h2>กำลังเตรียมเกม</h2><p>รอสักครู่...</p></div></div>
  <iframe id="frame" class="hidden" allow="camera; microphone; fullscreen; autoplay; clipboard-read; clipboard-write" allowfullscreen></iframe>

  <script src="js/config.js"></script>
  <script>
    const params = new URLSearchParams(location.search);
    const id = params.get('id');
    const frame = document.getElementById('frame');
    const loading = document.getElementById('loading');
    const titleEl = document.getElementById('title');
    const objectUrls = [];

    function escReg(s){return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')}
    function norm(p){return (p||'').replace(/^\.\//,'').replace(/^\//,'')}
    function dirOf(p){const a=norm(p).split('/');a.pop();return a.join('/')}
    function joinPath(base,p){ if(!p||/^(https?:|data:|blob:|#|javascript:|mailto:)/i.test(p)) return p; const stack=base?base.split('/'):[]; p.split('/').forEach(x=>{ if(!x||x==='.'){return}else if(x==='..'){stack.pop()}else{stack.push(x)} }); return stack.join('/'); }

    async function blobToText(blob){ return await blob.text(); }
    async function getBlob(path){ const url = await firebase.storage().ref(path).getDownloadURL(); return await fetch(url).then(r=>r.blob()); }
    function createUrl(blob){ const u=URL.createObjectURL(blob); objectUrls.push(u); return u; }

    function rewriteText(text, baseDir, urlMap){
      return text.replace(/(src|href)=(["'])(?!https?:|data:|blob:|#|javascript:|mailto:)([^"']+)\2/gi,(m,a,q,p)=>{
        const clean=p.split('?')[0].split('#')[0]; const full=joinPath(baseDir, clean); return urlMap[full] ? `${a}=${q}${urlMap[full]}${q}` : m;
      }).replace(/url\((["']?)(?!https?:|data:|blob:)([^)"']+)\1\)/gi,(m,q,p)=>{
        const clean=p.split('?')[0].split('#')[0]; const full=joinPath(baseDir, clean); return urlMap[full] ? `url(${q}${urlMap[full]}${q})` : m;
      });
    }

    async function start(){
      if(!id) throw new Error('ไม่พบรหัสเกม');
      await window.firebaseReady;
      const doc = await window.gamesRef.doc(id).get();
      if(!doc.exists) throw new Error('ไม่พบเกมนี้');
      const game = doc.data();
      titleEl.textContent = '🎮 ' + (game.title || 'เกม');
      const files = game.files || [];
      if(!files.length) throw new Error('เกมนี้ยังไม่มีไฟล์');
      const entry = game.entryFile || 'index.html';
      const entryMeta = files.find(f => norm(f.relativePath) === norm(entry)) || files.find(f => /\.html?$/i.test(f.relativePath));
      if(!entryMeta) throw new Error('ไม่พบไฟล์ HTML สำหรับเปิดเกม');

      const raw = {};
      for(const f of files){ raw[norm(f.relativePath)] = { ...f, blob: await getBlob(f.storagePath) }; }
      const urlMap = {};
      for(const [p,item] of Object.entries(raw)){
        if(!/\.html?$/i.test(p) && !/\.css$/i.test(p)) urlMap[p] = createUrl(item.blob);
      }
      for(const [p,item] of Object.entries(raw)){
        if(/\.css$/i.test(p)){
          const css = rewriteText(await blobToText(item.blob), dirOf(p), urlMap);
          urlMap[p] = createUrl(new Blob([css], {type:'text/css'}));
        }
      }
      for(const [p,item] of Object.entries(raw)){
        if(!urlMap[p] && p !== norm(entryMeta.relativePath)) urlMap[p] = createUrl(item.blob);
      }
      const html = rewriteText(await blobToText(raw[norm(entryMeta.relativePath)].blob), dirOf(entryMeta.relativePath), urlMap);
      frame.srcdoc = html;
      frame.classList.remove('hidden');
      loading.style.display = 'none';
    }
    start().catch(err=>{ console.error(err); loading.innerHTML=`<div><h2>เปิดเกมไม่สำเร็จ</h2><p>${err.message}</p></div>`; });
  </script>
</body>
</html>
