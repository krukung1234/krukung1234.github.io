<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ครูกุ้งสอนไอที | Game Hub</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="hero">
    <nav class="topbar">
      <div class="brand">🎮 <span>ครูกุ้งสอนไอที</span></div>
      <a class="admin-link" href="admin.html">Admin</a>
    </nav>
    <div class="hero-card">
      <h1>รวมเกมการศึกษา AI</h1>
      <p>เลือกเกมที่ชอบ แล้วกดเล่นได้เลย</p>
      <div class="searchbox">
        <input id="searchInput" placeholder="ค้นหาเกม เช่น ขยะ, Math, AR, AI..." />
      </div>
      <div id="chips" class="chips"></div>
    </div>
  </header>

  <main class="wrap">
    <div class="section-head">
      <h2>เกมทั้งหมด</h2>
      <span id="countText">0 เกม</span>
    </div>
    <div id="empty" class="empty hidden">ยังไม่พบเกม</div>
    <section id="games" class="grid"></section>
  </main>

  <script src="js/config.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
