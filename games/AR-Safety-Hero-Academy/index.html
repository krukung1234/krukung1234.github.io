<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>AR Safety Hero Academy</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;700;800;900&display=swap');
    :root{--wood1:#a96530;--wood2:#663418;--woodline:#d18b44;--paper:#fff3c9;--ink:#572b18;--mint:#8debbd;--sky:#73c8f0;--yellow:#ffe56d}*{box-sizing:border-box}html,body,#app{width:100%;height:100%;margin:0;overflow:hidden;font-family:'Noto Sans Thai',sans-serif;background:#17222b;color:#fff}button{font:inherit;cursor:pointer}
    #camera,#motionCanvas,#handCanvas{position:fixed;inset:0;width:100%;height:100%;object-fit:cover;background:#273847}#camera{transform:scaleX(-1)}#motionCanvas{display:none}#handCanvas{z-index:7;pointer-events:none;background:transparent}.veil{position:fixed;inset:0;background:linear-gradient(180deg,rgba(7,20,31,.18),rgba(7,20,31,.12) 58%,rgba(7,20,31,.38));pointer-events:none}.screen{display:none;position:fixed;inset:0;padding:max(14px,env(safe-area-inset-top)) max(14px,env(safe-area-inset-right)) max(14px,env(safe-area-inset-bottom)) max(14px,env(safe-area-inset-left));z-index:2}.screen.active{display:block}
    .wood{background:linear-gradient(180deg,var(--wood1),#80471f 48%,var(--wood2));border:4px solid var(--woodline);box-shadow:inset 0 2px rgba(255,232,170,.22),inset 0 -8px rgba(50,19,6,.28),0 7px 0 #452312,0 14px 26px rgba(0,0,0,.28);border-radius:19px}.paper{background:linear-gradient(135deg,#fff9dc,var(--paper));border:5px solid #b87339;box-shadow:inset 0 2px #fffce9,0 10px 0 #66381f,0 20px 34px rgba(0,0,0,.25);border-radius:28px}
    #home.active{display:grid;place-items:center;text-align:center}.home-card{width:min(680px,94vw);padding:36px 28px;color:var(--ink)}.home-card h1{margin:0;font-size:clamp(36px,6vw,66px);line-height:1}.home-card p{font-size:clamp(17px,2.5vw,23px);font-weight:800}.primary{border:3px solid #fff1aa;border-radius:16px;padding:13px 27px;color:#553019;background:linear-gradient(180deg,#ffe773,#e2a83c);box-shadow:0 5px 0 #a85b20;font-weight:900;font-size:21px}.primary:active{transform:translateY(3px);box-shadow:0 2px 0 #a85b20}
    #game{padding-top:max(12px,env(safe-area-inset-top))}.hud{position:absolute;z-index:5;top:max(12px,env(safe-area-inset-top));left:clamp(12px,2vw,28px);right:clamp(12px,2vw,28px);display:grid;grid-template-columns:auto 1fr auto;align-items:start;gap:12px}.hud-left,.hud-right{display:flex;gap:8px;flex-wrap:wrap}.hud-right{justify-content:flex-end}.chip{min-height:56px;padding:8px 14px;color:#fff8df;font-size:clamp(15px,1.5vw,21px);font-weight:900;white-space:nowrap}.chip b{display:block;text-align:center;font-size:1.3em;color:#fff09a;line-height:1;text-shadow:0 2px #552a12}.progress{display:none}
    .controls{display:flex;justify-content:center;gap:7px}.iconbtn{width:44px;height:44px;border-radius:14px;border:2px solid #fff0b8;background:#7c431f;color:#fff7d7;font-weight:900}.question-card{position:absolute;z-index:3;top:clamp(92px,12vh,132px);left:50%;transform:translateX(-50%);width:min(1200px,70vw);padding:18px 40px 20px;text-align:center;color:var(--ink)}.question-label{display:inline-block;margin-top:-43px;padding:5px 28px;border-radius:15px;border:4px solid #cc8740;background:linear-gradient(#a96631,#713a1c);color:white;font-size:clamp(18px,2vw,27px);font-weight:900;text-shadow:0 2px #43200e}.question-card h2{margin:6px 0 2px;font-size:clamp(52px,4.2vw,64px);line-height:1.06;font-weight:900}.question-card p{margin:0;color:#667184;font-weight:800}
    #answers{position:absolute;z-index:4;top:clamp(226px,29vh,294px);left:0;right:0;bottom:14px;pointer-events:none}.answer{position:absolute;top:32%;width:min(300px,23vw);aspect-ratio:1;border:5px solid var(--mint);border-radius:50%;background:rgba(255,255,255,.92);box-shadow:0 15px 36px rgba(0,0,0,.27),inset 0 -12px rgba(55,42,27,.07);padding:4%;pointer-events:auto;transition:transform .16s,box-shadow .16s,border-color .16s}.answer.left{left:clamp(10px,3vw,58px)}.answer.right{right:clamp(10px,3vw,58px);border-color:var(--sky)}.answer.targeted{transform:scale(1.04);border-color:var(--mint);box-shadow:0 0 0 6px rgba(141,235,189,.18),0 0 28px rgba(141,235,189,.8),0 15px 36px rgba(0,0,0,.3)}.answer img{width:100%;height:100%;object-fit:contain;transform:scale(1.42);filter:drop-shadow(0 10px 10px rgba(71,41,20,.2))}.answer-label{position:absolute;left:10%;right:10%;bottom:12%;padding:3px 8px;border-radius:10px;background:rgba(92,49,21,.88);color:#fff9dc;text-align:center;font-weight:900;font-size:clamp(13px,1.4vw,18px);line-height:1.1;text-shadow:0 1px #3b1a09}.answer .charge{position:absolute;left:12%;right:12%;bottom:7%;height:7px;border-radius:99px;overflow:hidden;background:rgba(70,45,25,.13)}.answer .charge i{display:block;width:var(--fill,0%);height:100%;background:linear-gradient(90deg,var(--yellow),var(--mint));border-radius:inherit}
    #pointer{position:fixed;z-index:8;width:34px;height:34px;margin:-17px;border:4px solid #fff;border-radius:50%;background:rgba(141,235,189,.6);box-shadow:0 0 22px var(--mint);pointer-events:none;opacity:0}.toast{position:fixed;z-index:9;left:50%;bottom:20px;transform:translateX(-50%);padding:9px 18px;border-radius:15px;background:rgba(255,255,255,.93);color:#4e3323;font-weight:900;opacity:0;transition:opacity .2s}.toast.show{opacity:1}
    #reward.active{display:grid;place-items:start center;padding-top:clamp(28px,7vh,74px);text-align:center}.reward-box{display:grid;justify-items:center;gap:9px}.reward-box h2{margin:0;width:min(720px,94vw);padding:18px 40px;color:var(--ink);font-size:clamp(28px,4.2vw,52px);line-height:1.12}.shield{width:clamp(148px,20vmin,205px);aspect-ratio:1;border:5px solid white;border-radius:34% 34% 44% 44%;background:radial-gradient(circle at 35% 28%,#e5ffff 0 8%,transparent 9%),linear-gradient(145deg,#92efc8,#5ac5ed 55%,#7e94df);box-shadow:0 0 0 9px rgba(141,235,189,.18),0 17px 38px rgba(0,0,0,.28);position:relative}.shield:before{content:'';position:absolute;inset:22%;border:5px solid rgba(255,255,255,.78);border-radius:28% 28% 42% 42%}.shield.hit{animation:hit .34s}.dots{display:flex;gap:8px}.dots i{width:19px;height:19px;border:2px solid #7ec8e5;border-radius:50%;background:#eaf5f7}.dots i.on{background:var(--yellow);box-shadow:0 0 15px var(--yellow)}.motion{width:min(320px,76vw);color:#fff5db;padding:7px 12px;font-size:14px;font-weight:900}.motion span{display:block;height:10px;margin-top:3px;border-radius:99px;overflow:hidden;background:rgba(31,16,8,.45)}#motionPower{display:block;width:0;height:100%;background:linear-gradient(90deg,var(--sky),var(--mint),var(--yellow));transition:width .1s}@keyframes hit{50%{transform:scale(1.1) rotate(-3deg)}}
    #end.active{display:grid;place-items:center;text-align:center}.end-card{width:min(680px,94vw);padding:30px;color:var(--ink)}.end-card h2{font-size:clamp(34px,6vw,58px);margin:0}.end-card p{font-size:21px;font-weight:900}.summary{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin:18px 0;text-align:left}.summary div{padding:9px 12px;border-radius:12px;background:rgba(178,105,50,.13);font-weight:900}.summary b{display:block;font-size:1.2em}.feedback{position:fixed;z-index:30;left:50%;top:48%;transform:translate(-50%,-50%) scale(.7);padding:16px 30px;border:5px solid white;border-radius:24px;background:linear-gradient(135deg,#fff499,#ffc15b);color:#6a2f16;font-size:clamp(42px,7vw,90px);line-height:1;font-weight:900;text-shadow:0 3px #fff9ce;opacity:0;pointer-events:none;white-space:pre-line;text-align:center}.feedback.show{opacity:1;animation:pop .65s ease}@keyframes pop{25%{transform:translate(-50%,-50%) scale(1.15)}100%{transform:translate(-50%,-50%) scale(1)}}.confetti{position:fixed;z-index:29;width:12px;height:18px;border-radius:3px;pointer-events:none;animation:fall .9s ease-out forwards}@keyframes fall{to{transform:translate(var(--dx),var(--dy)) rotate(540deg);opacity:0}}
    .final-focus{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:14px 0}.final-focus div{padding:12px;border-radius:17px;background:linear-gradient(135deg,#ffe97e,#f2bd50);border:3px solid #fff4b2;box-shadow:0 4px #a96322;color:#603116;font-weight:900}.final-focus b{display:block;font-size:clamp(34px,5vw,60px);line-height:1}.prize-pop{display:none;position:fixed;z-index:31;left:50%;top:50%;transform:translate(-50%,-50%);width:min(420px,88vw);padding:25px;text-align:center;color:var(--ink)}.prize-pop.show{display:grid;justify-items:center;animation:pop .7s ease}.prize-pop h2{margin:0;font-size:clamp(30px,5vw,48px)}.prize-pop img{width:150px;height:150px;object-fit:contain;filter:drop-shadow(0 12px 10px rgba(88,42,15,.25));animation:prizeBounce .7s ease-in-out infinite alternate}.bonus-score{margin:8px 0;padding:8px 18px;border:4px solid #b36b23;border-radius:15px;background:#fff29a;font-size:clamp(28px,5vw,46px);font-weight:900;color:#7b3518;box-shadow:0 5px #7d421b}@keyframes prizeBounce{to{transform:translateY(-16px) rotate(4deg)}}
    @media(max-width:820px){.hud{grid-template-columns:1fr;gap:7px}.hud-left,.hud-right{justify-content:center}.chip{min-height:44px;padding:6px 9px;font-size:14px}.controls{position:absolute;right:0;top:62px}.question-card{top:112px;width:min(92vw,760px);padding:18px 24px}.question-card h2{font-size:clamp(36px,5.2vw,42px)}#answers{top:225px}.answer{width:min(240px,30vw);top:32%}.reward-box h2{padding:18px 30px}}
    @media(max-width:560px){.hud{top:8px;left:8px;right:8px}.hud-left,.hud-right{gap:5px}.chip{font-size:12px;min-height:39px}.controls{top:50px}.iconbtn{width:36px;height:36px}.question-card{top:104px;width:94vw;padding:16px 17px;border-width:4px}.question-label{margin-top:-34px;font-size:16px;border-width:3px;padding:3px 16px}.question-card h2{font-size:clamp(30px,8vw,36px)}.question-card p{display:none}#answers{top:190px}.answer{top:25%;width:min(180px,44vw)}.answer-label{font-size:12px;bottom:13%}.reward-box{gap:7px}.reward-box h2{padding:14px 22px;font-size:clamp(26px,8vw,38px)}.shield{width:150px}.motion{font-size:12px}.summary,.final-focus{grid-template-columns:1fr}}
    .question-card h2 .unsafe-word{color:#d92929;text-decoration:underline;text-decoration-thickness:.09em;text-underline-offset:.12em}
    /* Game HUD: keep the centre clear for the question and keep answers inside frame. */
    .controls{display:none!important}
    @media(min-width:821px){
      .hud{grid-template-columns:auto 1fr auto;align-items:start}
      .hud-left{grid-column:1}
      .hud-right{grid-column:3;display:grid;grid-template-columns:repeat(2,minmax(0,1fr));grid-template-areas:'score score' 'coins combo';gap:7px;width:220px;min-width:220px}
      .hud-right .chip{min-height:48px;padding:7px 10px;font-size:clamp(14px,1.3vw,18px)}
      .hud-right .chip:nth-child(1){grid-area:score;min-height:78px;padding:10px 18px;font-size:clamp(18px,1.7vw,23px)}
      .hud-right .chip:nth-child(2){grid-area:coins}
      .hud-right .chip:nth-child(3){grid-area:combo}
      .question-card{top:clamp(12px,1.8vh,20px);width:min(900px,48vw);padding:14px 30px 16px}
      .question-label{margin-top:-39px}
      .question-card h2{margin:5px 0 0;font-size:clamp(38px,3.4vw,54px)}
      #answers{top:155px}
      .answer{top:22%}
    }
</style>
</head>
<body>
<main id="app"><video id="camera" playsinline muted></video><canvas id="motionCanvas" width="176" height="112"></canvas><canvas id="handCanvas"></canvas><div class="veil"></div><i id="pointer"></i><div id="toast" class="toast"></div><div id="feedback" class="feedback"></div><div id="prize" class="prize-pop paper"><h2>กล่องวิเศษ!</h2><img id="prizeArt" alt="รางวัลพิเศษ"><b id="prizeName"></b><div class="bonus-score">+5 คะแนน</div></div>
  <section id="home" class="screen active"><div class="home-card paper"><h1>AR Safety Hero Academy</h1><p>ชี้คำตอบด้วยนิ้ว และชนโล่พลังงานเพื่อสะสมเหรียญ</p><button id="start" class="primary">เริ่มภารกิจ</button></div></section>
  <section id="game" class="screen"><header class="hud"><div class="hud-left"><div class="chip wood">ข้อ <b id="round">1/20</b></div><div class="chip wood">เวลา <b id="time">60</b></div></div><div class="controls"><button id="sound" class="iconbtn" aria-label="ปิดเสียง">เสียง</button><button id="full" class="iconbtn" aria-label="เต็มจอ">เต็ม</button></div><div class="hud-right"><div class="chip wood">คะแนน <b id="score">0</b></div><div class="chip wood">เหรียญ <b id="coins">0</b></div><div class="chip wood">COMBO <b id="combo">0</b></div></div><div class="progress"><i id="progress"></i></div></header><div class="question-card paper"><span class="question-label">คำถาม</span><h2 id="question">สิ่งของใดปลอดภัย ?</h2><p id="hint">ยกมือขึ้นให้กล้องมองเห็นนะ</p></div><div id="answers"></div></section>
  <section id="reward" class="screen"><div class="reward-box"><h2 id="rewardTitle" class="paper">ชนโล่พลังงานให้ครบ 3 ครั้ง</h2><button id="shield" class="shield" aria-label="โล่พลังงาน"></button><div id="dots" class="dots"><i></i><i></i><i></i></div><div class="motion wood">พลังการเคลื่อนไหว<span><i id="motionPower"></i></span></div></div></section>
  <section id="end" class="screen"><div class="end-card paper"><h2>ภารกิจสำเร็จ!</h2><div class="final-focus"><div>คะแนนที่ได้<b id="finalScore">0</b></div><div>เวลาที่ใช้<b id="finalTime">00:00</b></div></div><p id="heroLevel"></p><div id="summary" class="summary"></div><button id="restart" class="primary">เล่นอีกครั้ง</button> <button id="homeAgain" class="primary">กลับหน้าหลัก</button></div></section>
</main>
<script type="module">
const $=id=>document.getElementById(id), screens=['home','game','reward','end'];
const pairs=[['plush','knife'],['book','outlet'],['ball','scissors'],['crayon','medicine'],['blocks','kettle'],['helmet','lighter'],['cup','bleach'],['puzzle','wire'],['toothbrush','pan'],['softToyCar','matches'],['pillow','cutter'],['spoon','glue'],['banana','hotIron'],['teddy','glass'],['soap','saw'],['hat','brokenBulb'],['pencil','spray'],['lunchbox','stove'],['rubberDuck','detergent'],['socks','needle']];
const labels={plush:'ตุ๊กตาผ้านุ่ม',knife:'มีด',book:'หนังสือนิทาน',outlet:'ปลั๊กไฟ',ball:'ลูกบอล',scissors:'กรรไกร',crayon:'สีเทียน',medicine:'ยาเม็ด',blocks:'บล็อกตัวต่อ',kettle:'กาต้มน้ำร้อน',helmet:'หมวกกันน็อก',lighter:'ไฟแช็ก',cup:'แก้วน้ำ',bleach:'น้ำยาฟอกขาว',puzzle:'จิ๊กซอว์',wire:'สายไฟชำรุด',toothbrush:'แปรงสีฟัน',pan:'กระทะร้อน',softToyCar:'รถของเล่น',matches:'ไม้ขีดไฟ',pillow:'หมอนนุ่ม',cutter:'มีดคัตเตอร์',spoon:'ช้อนเด็ก',glue:'กาวสารเคมี',banana:'กล้วย',hotIron:'เตารีดร้อน',teddy:'ตุ๊กตาหมี',glass:'แก้วแตก',soap:'สบู่',saw:'เลื่อย',hat:'หมวกเด็ก',brokenBulb:'หลอดไฟแตก',pencil:'ดินสอ',spray:'สเปรย์เคมี',lunchbox:'กล่องข้าว',stove:'เตาแก๊ส',rubberDuck:'เป็ดยาง',detergent:'น้ำยาซักผ้า',socks:'ถุงเท้า',needle:'เข็มเย็บผ้า'};
const safeTexts=['สิ่งของใดที่ปลอดภัย ?'];
const unsafeTexts=['สิ่งของใดไม่ปลอดภัย ?'];
const magicGifts=[{name:'ตุ๊กตาหมีนุ่มนิ่ม',art:'teddy'},{name:'รถของเล่นฮีโร่',art:'softToyCar'},{name:'ลูกบอลพลังงาน',art:'ball'}];
let deck=[],idx=0,score=0,coins=0,combo=0,maxCombo=0,correct=0,stars=0,specials=0,hits=0,rewardSpecial=false,landmarker=null,stream=null,lastVideo=-1,raf=0,timer=0,seconds=60,hover=-1,hoverAt=0,lastFrame=null,lastShield=0;
const handLinks=[[0,1],[1,2],[2,3],[3,4],[0,5],[5,6],[6,7],[7,8],[5,9],[9,10],[10,11],[11,12],[9,13],[13,14],[14,15],[15,16],[13,17],[0,17],[17,18],[18,19],[19,20]];
function show(id){screens.forEach(x=>$(x).classList.toggle('active',x===id));if(id!=='game')clearHand()}
function shuffle(a){return [...a].sort(()=>Math.random()-.5)}
function startGame(){deck=shuffle(pairs).map((p,n)=>({p,askSafe:Math.random()>.5,n,text:''})).map(q=>{const list=q.askSafe?safeTexts:unsafeTexts;return {...q,text:list[Math.floor(Math.random()*list.length)]}});idx=score=coins=combo=maxCombo=correct=stars=specials=hits=0;seconds=0;clearInterval(timer);timer=setInterval(()=>{seconds++;renderHud()},1000);renderHud();showQuestion()}
function clock(t){return `${String(Math.floor(t/60)).padStart(2,'0')}:${String(t%60).padStart(2,'0')}`}
function renderHud(){$('round').textContent=`${Math.min(idx+1,20)}/20`;$('time').textContent=clock(seconds);$('score').textContent=score;$('coins').textContent=coins;$('combo').textContent=combo}
function showQuestion(){if(idx>=deck.length)return finish();hover=-1;hoverAt=0;show('game');const q=deck[idx], answer=q.askSafe?q.p[0]:q.p[1], options=shuffle(q.p.map(k=>({k,correct:k===answer})));$('question').textContent=q.text;$('hint').textContent='';$('answers').innerHTML=options.map((o,i)=>`<button class="answer ${i?'right':'left'}" data-correct="${o.correct}"><img src="ar-safety-assets/${o.k}.png" alt="${labels[o.k]}"><span class="answer-label">${labels[o.k]}</span><span class="charge"><i></i></span></button>`).join('');document.querySelectorAll('.answer').forEach((b,i)=>b.onclick=()=>choose(i));renderHud()}
function choose(i){const btn=document.querySelectorAll('.answer')[i];if(!btn||btn.dataset.lock)return;hover=-1;hoverAt=0;document.querySelectorAll('.answer').forEach(b=>b.dataset.lock='1');const isCorrect=btn.dataset.correct==='true';if(isCorrect){score++;correct++;stars++;coins++;combo++;maxCombo=Math.max(maxCombo,combo);showFeedback('+1','good');const special=combo%3===0;if(special){specials++;toast('COMBO 3! ได้กล่องวิเศษ');}setTimeout(()=>startReward(special),650)}else{score=Math.max(0,score-1);combo=0;showFeedback('-1','bad');setTimeout(()=>{idx++;showQuestion()},650)}renderHud()}
function startReward(special=false){rewardSpecial=special;hits=0;lastFrame=null;document.querySelectorAll('#dots i').forEach(x=>x.classList.remove('on'));$('motionPower').style.width='0%';$('rewardTitle').textContent=special?'กล่องวิเศษ! โหม่งโล่ให้ครบ 3 ครั้ง':'โหม่งโล่พลังงานให้ครบ 3 ครั้ง';show('reward')}
function hitShield(){if(Date.now()-lastShield<600)return;lastShield=Date.now();hits++;coins++;$('shield').classList.remove('hit');void $('shield').offsetWidth;$('shield').classList.add('hit');$('dots').children[hits-1]?.classList.add('on');renderHud();if(hits>=3){if(rewardSpecial){const gift=magicGifts[Math.floor(Math.random()*magicGifts.length)];score+=5;showPrize(gift);renderHud();}else toast('เยี่ยมมาก!');idx++;setTimeout(showQuestion,rewardSpecial?1750:900)}}
function showPrize(gift){$('prizeArt').src=`ar-safety-assets/${gift.art}.png`;$('prizeName').textContent=`ได้รับ ${gift.name}`;$('prize').classList.add('show');confetti();setTimeout(()=>$('prize').classList.remove('show'),1450)}
function finish(){clearInterval(timer);const level=correct>=18?'ฮีโร่ความปลอดภัยระดับยอดเยี่ยม':correct>=14?'ฮีโร่ความปลอดภัยระดับเก่งมาก':correct>=10?'ฮีโร่ความปลอดภัยระดับฝึกฝน':'ฮีโร่ฝึกหัด ลองเล่นอีกครั้งนะ';$('finalScore').textContent=score;$('finalTime').textContent=clock(seconds);$('heroLevel').textContent=level;$('summary').innerHTML=`<div>ข้อถูกจาก 20 ข้อ<b>${correct}/20</b></div><div>จำนวนดาว<b>${stars}</b></div><div>จำนวนเหรียญ<b>${coins}</b></div><div>คอมโบสูงสุด<b>${maxCombo}</b></div><div>รางวัลพิเศษ<b>${specials}</b></div><div>เวลาที่ใช้<b>${clock(seconds)}</b></div>`;show('end')}
function toast(t){$('toast').textContent=t;$('toast').classList.add('show');setTimeout(()=>$('toast').classList.remove('show'),700)}
function showFeedback(text,kind){const el=$('feedback');el.textContent=text;el.style.background=kind==='good'?'linear-gradient(135deg,#fff499,#ffc15b)':'linear-gradient(135deg,#ffd1ca,#ff8f78)';el.classList.remove('show');void el.offsetWidth;el.classList.add('show');if(kind==='good')confetti();setTimeout(()=>el.classList.remove('show'),620)}
function confetti(){const colors=['#ffe36b','#8debbd','#73c8f0','#ff9cb6','#c9a5ff'];for(let i=0;i<34;i++){const p=document.createElement('i');p.className='confetti';p.style.left=`${innerWidth/2+(Math.random()-.5)*120}px`;p.style.top=`${innerHeight*.47}px`;p.style.background=colors[i%colors.length];p.style.setProperty('--dx',`${(Math.random()-.5)*560}px`);p.style.setProperty('--dy',`${120+Math.random()*380}px`);document.body.appendChild(p);setTimeout(()=>p.remove(),950)}}
async function camera(){try{stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'user'},audio:false});$('camera').srcObject=stream;await $('camera').play();const mp=await import('https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@latest');const files=await mp.FilesetResolver.forVisionTasks('https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@latest/wasm');landmarker=await mp.HandLandmarker.createFromOptions(files,{baseOptions:{modelAssetPath:'https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task'},runningMode:'VIDEO',numHands:1});loop()}catch(e){toast('เปิดกล้องไม่ได้: ใช้การแตะคำตอบได้')}}
function loop(){raf=requestAnimationFrame(loop);if(!$('camera').videoWidth)return;if($('game').classList.contains('active')&&landmarker&&$('camera').currentTime!==lastVideo){lastVideo=$('camera').currentTime;const r=landmarker.detectForVideo($('camera'),performance.now());const hand=r.landmarks?.[0];if(hand)track(hand);else clearHand()}if($('reward').classList.contains('active'))motion()}
function screenPoint(p){const v=$('camera'),scale=Math.max(innerWidth/v.videoWidth,innerHeight/v.videoHeight),w=v.videoWidth*scale,h=v.videoHeight*scale;return{x:(innerWidth-w)/2+(1-p.x)*w,y:(innerHeight-h)/2+p.y*h}}
function drawHand(points){const c=$('handCanvas'),d=Math.min(devicePixelRatio||1,2),w=Math.round(innerWidth*d),h=Math.round(innerHeight*d);if(c.width!==w||c.height!==h){c.width=w;c.height=h}const x=c.getContext('2d');x.setTransform(d,0,0,d,0,0);x.clearRect(0,0,innerWidth,innerHeight);x.lineCap='round';x.lineJoin='round';x.strokeStyle='#8debbd';x.lineWidth=5;x.shadowColor='#54d9f0';x.shadowBlur=14;handLinks.forEach(([a,b])=>{x.beginPath();x.moveTo(points[a].x,points[a].y);x.lineTo(points[b].x,points[b].y);x.stroke()});points.forEach((p,i)=>{x.beginPath();x.fillStyle=i===8?'#fff17b':'#ffffff';x.arc(p.x,p.y,i===8?10:5,0,Math.PI*2);x.fill()});x.shadowBlur=0}
function clearHand(){const c=$('handCanvas'),x=c.getContext('2d');x.clearRect(0,0,c.width,c.height);$('pointer').style.opacity=0;hover=-1;document.querySelectorAll('.answer').forEach(b=>b.classList.remove('targeted'))}
function track(hand){const points=hand.map(screenPoint),p=points[8],x=p.x,y=p.y;drawHand(points);const orb=$('pointer');orb.style.left=x+'px';orb.style.top=y+'px';orb.style.opacity=1;const answers=[...document.querySelectorAll('.answer')];let target=-1;answers.forEach((b,i)=>{const r=b.getBoundingClientRect();if(x>=r.left&&x<=r.right&&y>=r.top&&y<=r.bottom)target=i});if(target!==hover){hover=target;hoverAt=Date.now()}answers.forEach((b,i)=>{const on=i===target;b.classList.toggle('targeted',on);b.querySelector('.charge i').style.setProperty('--fill',on?`${Math.min(100,(Date.now()-hoverAt)/300*100)}%`:'0%')});if(target>=0&&Date.now()-hoverAt>300)choose(target)}
function motion(){const c=$('motionCanvas'),ctx=c.getContext('2d'),v=$('camera');ctx.drawImage(v,0,0,c.width,c.height);const a=ctx.getImageData(0,0,c.width,c.height).data;if(lastFrame){let n=0;for(let i=0;i<a.length;i+=16)n+=Math.abs(a[i]-lastFrame[i]);const level=Math.min(100,n/(a.length/16)*3.5);$('motionPower').style.width=level+'%';if(level>12)hitShield()}lastFrame=new Uint8ClampedArray(a)}
$('start').onclick=async()=>{startGame();await camera()};$('restart').onclick=startGame;$('homeAgain').onclick=()=>{clearInterval(timer);show('home')};$('shield').onclick=hitShield;$('full').onclick=()=>document.fullscreenElement?document.exitFullscreen():document.documentElement.requestFullscreen?.();$('sound').onclick=()=>toast('เกมนี้ใช้เสียงตอบกลับจากภาพและการเคลื่อนไหว');
// ปรับเนื้อหาและสูตรคะแนน: คะแนนรวม = ตอบถูก + โบนัสจากกล่องวิเศษ
pairs[11][1]='pesticide';
labels.pesticide='ยาฆ่าแมลง';
safeTexts[0]='สิ่งของใดปลอดภัย ?';
unsafeTexts[0]='สิ่งของใด <span class="unsafe-word">ไม่</span> ปลอดภัย ?';
$('homeAgain').textContent='ออกจากเกม';
let wrongAnswers=0,bonusPoints=0;

startGame=function(){
  deck=shuffle(pairs).map((p,n)=>({p,askSafe:Math.random()>.5,n,text:''})).map(q=>{
    const list=q.askSafe?safeTexts:unsafeTexts;
    return {...q,text:list[Math.floor(Math.random()*list.length)]};
  });
  idx=score=coins=combo=maxCombo=correct=stars=specials=hits=0;
  wrongAnswers=bonusPoints=0;seconds=0;clearInterval(timer);
  timer=setInterval(()=>{seconds++;renderHud()},1000);renderHud();showQuestion();
}
showQuestion=function(){
  if(idx>=deck.length)return finish();
  hover=-1;hoverAt=0;show('game');
  const q=deck[idx],answer=q.askSafe?q.p[0]:q.p[1],options=shuffle(q.p.map(k=>({k,correct:k===answer})));
  $('question').innerHTML=q.text;$('hint').textContent='';
  $('answers').innerHTML=options.map((o,i)=>`<button class="answer ${i?'right':'left'}" data-correct="${o.correct}"><img src="ar-safety-assets/${o.k}.png" alt="${labels[o.k]}"><span class="answer-label">${labels[o.k]}</span><span class="charge"><i></i></span></button>`).join('');
  document.querySelectorAll('.answer').forEach((b,i)=>b.onclick=()=>choose(i));renderHud();
}
choose=function(i){
  const btn=document.querySelectorAll('.answer')[i];if(!btn||btn.dataset.lock)return;
  hover=-1;hoverAt=0;document.querySelectorAll('.answer').forEach(b=>b.dataset.lock='1');
  const isCorrect=btn.dataset.correct==='true';
  if(isCorrect){
    correct++;stars++;coins++;score=correct+bonusPoints;combo++;maxCombo=Math.max(maxCombo,combo);
    showFeedback('+1','good');const special=combo%3===0;
    if(special)toast('COMBO 3! ได้กล่องวิเศษ');
    setTimeout(()=>startReward(special),650);
  }else{
    wrongAnswers++;combo=0;showFeedback('ลองใหม่!','bad');
    setTimeout(()=>{idx++;showQuestion()},650);
  }
  renderHud();
}
hitShield=function(){
  if(Date.now()-lastShield<600)return;lastShield=Date.now();hits++;coins++;
  $('shield').classList.remove('hit');void $('shield').offsetWidth;$('shield').classList.add('hit');
  $('dots').children[hits-1]?.classList.add('on');renderHud();
  if(hits>=3){
    if(rewardSpecial){
      const gift=magicGifts[Math.floor(Math.random()*magicGifts.length)];
      specials++;bonusPoints+=5;score=correct+bonusPoints;showPrize(gift);renderHud();
    }else toast('เยี่ยมมาก!');
    idx++;setTimeout(showQuestion,rewardSpecial?1750:900);
  }
}
finish=function(){
  clearInterval(timer);
  const level=correct>=18?'ฮีโร่ความปลอดภัยระดับยอดเยี่ยม':correct>=14?'ฮีโร่ความปลอดภัยระดับเก่งมาก':correct>=10?'ฮีโร่ความปลอดภัยระดับฝึกฝน':'ฮีโร่ฝึกหัด ลองเล่นอีกครั้งนะ';
  $('finalScore').textContent=score;$('finalTime').textContent=clock(seconds);$('heroLevel').textContent=level;
  $('summary').innerHTML=`<div>ตอบถูกจาก 20 ข้อ<b>${correct}/20</b></div><div>ตอบผิด (ไม่หักคะแนน)<b>${wrongAnswers}</b></div><div>คะแนนจากตอบถูก<b>${correct}</b></div><div>โบนัสกล่องวิเศษ<b>+${bonusPoints}</b></div><div>จำนวนเหรียญ<b>${coins}</b></div><div>คอมโบสูงสุด<b>${maxCombo}</b></div><div>กล่องวิเศษที่เปิด<b>${specials}</b></div><div>เวลาที่ใช้<b>${clock(seconds)}</b></div>`;
  show('end');
}
$('start').onclick=async()=>{startGame();await camera()};
$('restart').onclick=startGame;
$('homeAgain').onclick=()=>{clearInterval(timer);show('home')};
$('shield').onclick=hitShield;
$('full').onclick=()=>document.fullscreenElement?document.exitFullscreen():document.documentElement.requestFullscreen?.();
$('sound').onclick=()=>toast('เกมนี้ใช้เสียงตอบกลับจากภาพและการเคลื่อนไหว');
</script></body></html>
