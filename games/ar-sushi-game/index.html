<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#c92931">
  <title>AR Sushi คำควบกล้ำ</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Mali:wght@500;600;700&family=Noto+Sans+Thai:wght@500;700;800&display=swap');
    :root{--red:#c92c35;--cream:#fff7e8;--yellow:#ffc53d;--ink:#372318;--green:#3aa76d;--wood:#8a4f2c;--shadow:0 7px 0 #6e321d,0 12px 22px #1d0b0747;}
    *{box-sizing:border-box} html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#29120d;font-family:'Noto Sans Thai',sans-serif;color:var(--ink)} button{font:inherit;border:0;cursor:pointer} .screen{position:fixed;inset:0;display:none;overflow:hidden}.screen.active{display:flex}
    .home{align-items:center;justify-content:center;background:radial-gradient(circle at 50% 24%,#ffdc7b 0,#e27738 29%,#71291b 76%);padding:18px}.home::before{content:'';position:absolute;inset:0;opacity:.28;background:repeating-linear-gradient(90deg,#fff0 0 9%,#35120f 9.3% 9.8%,#fff0 10.2% 20%)}
    .home-card{position:relative;width:min(1440px,100%);aspect-ratio:16/9;border:7px solid #fff4d5;border-radius:34px;background:url('home-cover.png') center/cover;box-shadow:0 16px 40px #160503a8;overflow:hidden;text-align:center}.home-card>*{z-index:1}.lantern{display:none}
    .title-kicker{color:#fff4d5;font:700 clamp(15px,2.3vw,23px) 'Mali';letter-spacing:1px;margin:3px}.game-title{position:relative;margin:0;color:#fff8e9;font:700 clamp(40px,7vw,78px) 'Mali';line-height:1.08;text-shadow:0 4px #9d1f26,0 9px #68241a}.subtitle{display:inline-block;background:#fff4d4;border:3px solid #75401f;border-radius:18px;padding:6px 18px;color:#6e371f;font:700 clamp(16px,2.8vw,25px) 'Mali';margin:10px}.home-sushi{display:flex;align-items:flex-end;justify-content:center;gap:clamp(8px,2vw,22px);height:clamp(170px,27vh,255px);padding-top:18px}.chef{width:clamp(90px,16vw,148px);height:clamp(130px,22vw,205px);border-radius:48% 48% 35% 35%;background:linear-gradient(#fff 0 24%,#ffb17e 25% 67%,#f6f0df 68%);border:4px solid #6e3724;position:relative;box-shadow:var(--shadow)}.chef:before{content:'◕‿◕';position:absolute;top:29%;left:0;width:100%;font-size:clamp(24px,5vw,42px);color:#422318}.chef:after{content:'寿司';position:absolute;bottom:6%;left:0;width:100%;font:700 clamp(16px,3vw,25px) 'Mali';color:#c92c35}.chef:nth-child(3){transform:scaleX(-1)}.home-plate{position:relative;width:clamp(180px,34vw,330px);height:clamp(105px,18vw,165px);border-radius:50%;background:radial-gradient(ellipse,#f9fbf4 0 35%,#55a2ca 36% 43%,#f6f2df 44% 58%,#2d729b 59% 67%,#e6f1ea 68%);border:4px solid #6e3724;box-shadow:0 13px 0 #5a291b}.home-plate .sushi{position:absolute;bottom:25%;transform:scale(.8)}.home-plate .sushi:nth-child(1){left:11%}.home-plate .sushi:nth-child(2){left:38%}.home-plate .sushi:nth-child(3){right:8%}
    .home-actions{position:absolute;z-index:2;left:50%;top:54%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:stretch;gap:12px;margin:0}.big-btn,.small-btn{color:white;border:3px solid #fff1c4;border-radius:18px;box-shadow:0 5px 0 #863414,0 8px 15px #3f1608aa;font-weight:800;transition:transform .15s,filter .15s}.big-btn{background:linear-gradient(#ffc52e,#f17b17);font-size:clamp(21px,3vw,30px);padding:11px 34px;min-width:270px}.big-btn.green{background:linear-gradient(#70c943,#32964b)}.big-btn.blue{background:linear-gradient(#3fc4e8,#177ebc)}.small-btn{background:#c92c35;padding:9px 16px;font-size:16px}.big-btn:hover,.small-btn:hover{filter:brightness(1.08);transform:translateY(-2px)}.big-btn:active,.small-btn:active{transform:translateY(4px);box-shadow:0 1px 0 #863414}
    .modal-layer{display:none;align-items:center;justify-content:center;position:fixed;inset:0;z-index:30;background:#160b09bb;padding:18px}.modal-layer.show{display:flex}.modal{width:min(620px,100%);max-height:90vh;overflow:auto;border:5px solid #ffe6a3;border-radius:27px;padding:25px;background:#fff6df;box-shadow:0 14px 40px #0008;text-align:center}.modal h2{font:700 30px 'Mali';margin:0 0 8px;color:#ba2d34}.modal p{line-height:1.7;margin:8px 0}.level-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:18px 0}.level-card{border:3px solid #c98a35;border-radius:17px;background:#fff;padding:15px;text-align:left;color:#452317}.level-card strong{display:block;font:700 21px 'Mali';color:#bf3037}.level-card small{line-height:1.45}.modal-actions{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;margin-top:18px}.notice{min-height:27px;color:#7e3422;font-weight:700}.how-list{text-align:left;line-height:1.8;padding-left:22px}.how-list li::marker{color:#c92c35;font-weight:800}
    #gameScreen{background:#1a0d0b;isolation:isolate}.camera{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transform:scaleX(-1);background:linear-gradient(135deg,#5c2e20,#cb7851)}.camera-cover{position:absolute;inset:0;background:radial-gradient(ellipse at center,#ffdca73d,#1a0d0b7d),linear-gradient(#0000 45%,#411c1380);pointer-events:none}.game-stage{position:absolute;inset:0;overflow:hidden}.hud{position:absolute;top:max(9px,env(safe-area-inset-top));left:50%;z-index:7;transform:translateX(-50%);width:min(1180px,calc(100% - 18px));display:grid;grid-template-columns:auto minmax(330px,1fr) auto;gap:10px;align-items:stretch}.hud-panel{border:3px solid #fff0ba;border-radius:19px;background:linear-gradient(145deg,#c34a43eb,#74231fe8);color:white;box-shadow:inset 0 0 0 2px #71301d,0 5px 0 #4a1c14,0 10px 18px #17080799;padding:8px 14px;text-shadow:0 2px #56211b}.objective-panel{grid-column:2;text-align:center;min-width:0}.round-label{font:700 clamp(13px,1.5vw,17px) 'Mali';color:#ffe69c}.objective{font:800 clamp(22px,3vw,34px) 'Mali';line-height:1.16;letter-spacing:.01em}.stats{grid-column:1;grid-row:1;display:flex;gap:12px;align-items:center;justify-content:space-around;font-weight:800;font-size:clamp(12px,1.6vw,16px)}.stats b{display:block;color:#fff0a9;font-size:clamp(18px,2.25vw,25px);line-height:1}.hud-buttons{grid-column:3;grid-row:1;display:flex;gap:7px}.icon-btn{min-width:47px;border:3px solid #fff1bd;border-radius:16px;background:linear-gradient(#ffc94c,#db7621);color:#fff;font-size:20px;font-weight:800;box-shadow:0 4px 0 #87401a}.camera-status{position:absolute;z-index:8;top:clamp(112px,17vh,156px);left:50%;transform:translateX(-50%);max-width:90%;background:#482514e8;color:#fff6d7;border:2px solid #ffe5a3;border-radius:13px;padding:8px 15px;text-align:center;font:700 16px 'Mali';transition:opacity .3s}.camera-status.hidden{opacity:0;pointer-events:none}.hand-layer{position:absolute;inset:0;z-index:6;pointer-events:none}.hand-layer canvas{width:100%;height:100%}.pointer{position:absolute;z-index:12;width:30px;height:30px;border:3px solid #fff;box-shadow:0 0 0 5px #ee3c46,0 0 25px 8px #ffea59;border-radius:50%;transform:translate(-50%,-50%);display:none;pointer-events:none}.pointer.pinch{background:#ffe763;box-shadow:0 0 0 6px #ee3c46,0 0 36px 10px #ffe763}
    .plate-wrap{position:absolute;z-index:4;left:50%;top:49%;width:clamp(205px,31vw,385px);aspect-ratio:1.55;transform:translate(-50%,-50%);border:7px solid #fff8e2;border-radius:50%;background:radial-gradient(ellipse at center,#fffdf3 0 41%,#fad99b 42% 47%,#4e9ac5 48% 53%,#f9efd0 54% 58%,#1c5e91 59% 64%,#f4c87a 65% 69%,#8f422c 70%);box-shadow:inset 0 0 0 5px #e6f6f9,0 11px 0 #52201480,0 17px 28px #180a0780}.plate-wrap:before{content:'จานรับซูชิ';position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);color:#9b654ddd;font:700 clamp(17px,2.2vw,25px) 'Mali';white-space:nowrap;text-shadow:0 1px #fff}.plate-wrap:after{content:'✿   ✿   ✿';position:absolute;left:50%;bottom:13%;transform:translateX(-50%);color:#e67a75;font-size:clamp(11px,2vw,19px);letter-spacing:4px}.plate-count{position:absolute;right:5%;top:9%;background:#d84a51;color:#fff;border:3px solid #fff0bd;border-radius:20px;padding:2px 9px;font-weight:800;z-index:3}.plate-items{position:absolute;inset:13% 11%;display:flex;gap:4px;flex-wrap:wrap;align-content:center;justify-content:center}.plate-mini{position:relative;width:clamp(43px,6vw,72px);height:clamp(45px,6.5vw,74px);display:grid;place-items:end center}.plate-mini .sushi{position:relative;left:auto;bottom:auto;transform:none;width:100%;height:88%}.plate-mini span{position:absolute;bottom:-11px;max-width:70px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#5b2e1d;font:700 10px 'Mali'}
    .conveyor{position:absolute;z-index:3;left:-2%;right:-2%;bottom:-4px;height:clamp(139px,25vh,212px);border-top:10px solid #e1b15a;border-bottom:10px solid #6d321d;background:repeating-linear-gradient(90deg,#26292c 0 46px,#4d5153 47px 50px,#26292c 51px 96px);box-shadow:inset 0 11px #101112,inset 0 -11px #101112,0 -9px 14px #15070499;overflow:hidden}.conveyor:before{content:'';position:absolute;left:0;right:0;top:36%;height:8px;background:#f4c35b;box-shadow:0 9px #81431e}.sushi-item{position:absolute;z-index:5;width:clamp(70px,10.5vw,122px);height:clamp(92px,15vw,138px);bottom:clamp(18px,4vh,38px);will-change:left,top;touch-action:none}.sushi-item.grabbed{z-index:13;transition:none;filter:drop-shadow(0 7px 7px #1c0909a8)}.word-tag{position:absolute;z-index:3;left:50%;top:0;transform:translateX(-50%);min-width:90%;padding:3px 7px;border:2px solid #804025;border-radius:10px;background:#fff8dd;color:#3e261a;font:800 clamp(14px,2.2vw,20px) 'Mali';text-align:center;white-space:nowrap;box-shadow:0 3px 0 #b5733b}.sushi{position:absolute;bottom:-2%;left:50%;transform:translateX(-50%);width:108%;height:80%;background:center/contain no-repeat;filter:drop-shadow(0 4px 3px #1c090950)}.sushi:before,.sushi:after{display:none}.sushi.salmon{background-image:url('assets/sushi/salmon.png')}.sushi.tuna{background-image:url('assets/sushi/tuna.png')}.sushi.egg{background-image:url('assets/sushi/egg.png')}.sushi.shrimp{background-image:url('assets/sushi/shrimp.png')}.sushi.crab{background-image:url('assets/sushi/crab.png')}.sushi.maki{background-image:url('assets/sushi/maki.png')}.sushi.roe{background-image:url('assets/sushi/roe.png')}
    .level-map{align-items:stretch;justify-content:stretch;background:#122c34 url('level-map.png') center/cover no-repeat}.level-map::before{content:'';position:absolute;inset:0;background:linear-gradient(#08151a0b,#08151a26);pointer-events:none}.map-top{display:none}.map-back{position:absolute;z-index:3;left:clamp(12px,3vw,42px);bottom:max(16px,env(safe-area-inset-bottom));background:#b63b33;color:#fff;border:3px solid #fff2bf;border-radius:18px;padding:10px 17px;font-weight:800;box-shadow:0 4px 0 #68271c}.stage-node{position:absolute;z-index:3;width:clamp(150px,19vw,310px);height:clamp(150px,23vw,330px);border-radius:26px;background:#0000;border:0;cursor:pointer}.stage-node:focus-visible{outline:5px solid #fff16e;outline-offset:5px}.stage-node .node-status{position:absolute;left:50%;bottom:2%;transform:translateX(-50%);white-space:nowrap;font:800 clamp(14px,2vw,27px) 'Mali';color:#fff;text-shadow:0 2px 4px #32130b}.stage-node.locked{filter:grayscale(.75);cursor:not-allowed}.stage-node.locked .node-status{font-size:clamp(25px,4vw,48px)}.node-1{left:8%;top:43%}.node-2{left:29%;top:43%}.node-3{left:50%;top:43%}.node-4{left:71%;top:43%}.map-hint{display:none}
    .feedback{position:absolute;z-index:20;left:50%;top:30%;transform:translate(-50%,-50%) scale(.8);opacity:0;color:#fff;border-radius:18px;padding:9px 19px;border:3px solid #fff6cb;background:#2f9664e8;font:800 clamp(22px,4vw,39px) 'Mali';text-shadow:0 2px #24582e;pointer-events:none}.feedback.show{animation:pop 1.1s both}.feedback.bad{background:#c9383ce8}@keyframes pop{0%{opacity:0;transform:translate(-50%,-50%) scale(.5)}18%,75%{opacity:1;transform:translate(-50%,-50%) scale(1)}100%{opacity:0;transform:translate(-50%,-68%) scale(.95)}}
    .summary{align-items:center;justify-content:center;background:radial-gradient(circle,#f9d67c,#a3422c 65%,#3a180f);padding:18px}.summary-card{width:min(570px,100%);border:6px solid #fff0bc;border-radius:30px;background:#fff7df;text-align:center;padding:26px;box-shadow:0 15px 35px #240c08a0}.summary-card h1{margin:0;color:#c72d36;font:800 clamp(34px,7vw,55px) 'Mali';text-shadow:0 3px #ffd887}.summary-score{font:800 58px 'Mali';color:#e68b1e;margin:5px}.result-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin:15px 0}.result-grid div{background:#fff;border:2px solid #e3b65d;border-radius:13px;padding:8px;font-weight:700}.result-grid b{display:block;color:#b83135;font-size:24px}.rank{font:800 22px 'Mali';color:#4a7943;margin:8px 0 15px}
    @media(max-width:620px){.home-card{border-width:4px;border-radius:24px}.lantern{display:none}.home-sushi{height:180px}.hud{grid-template-columns:1fr auto}.hud-panel.objective-panel{grid-column:1/-1;grid-row:1}.hud-panel.stats{grid-column:1;grid-row:2}.hud-buttons{grid-column:2;grid-row:2}.hud-panel{padding:5px 8px}.objective{font-size:clamp(20px,6vw,27px)}.plate-wrap{top:47%;width:clamp(165px,57vw,255px)}.conveyor{height:clamp(126px,23vh,160px)}.sushi-item{width:68px;height:87px}.word-tag{font-size:14px}.camera-status{top:124px;font-size:13px}.level-grid{grid-template-columns:1fr}.modal{padding:19px}.game-title{font-size:45px}}
  </style>
</head>
<body>
  <main id="homeScreen" class="screen home active" aria-label="หน้าแรกเกม">
    <section class="home-card">
      <div class="home-actions"><button class="big-btn" id="startBtn">▶ เริ่มเกม</button><button class="big-btn green" id="howBtn">📖 วิธีเล่น</button><button class="big-btn blue" id="levelsBtn">🏆 เลือกด่าน</button></div>
    </section>
  </main>

  <section id="levelScreen" class="screen level-map" aria-label="แผนที่เลือกด่าน">
    <button id="mapBackBtn" class="map-back">⌂ หน้าหลัก</button><h2 class="map-top">เลือกด่านผจญภัย</h2>
    <button class="stage-node node-1" data-map-level="true" aria-label="ด่าน 1 คำควบกล้ำแท้"><span class="node-status"></span></button>
    <button class="stage-node node-2" data-map-level="false" aria-label="ด่าน 2 คำควบกล้ำไม่แท้"><span class="node-status"></span></button>
    <button class="stage-node node-3" data-map-level="mix" aria-label="ด่าน 3 แยกคำควบกล้ำ"><span class="node-status"></span></button>
    <button class="stage-node node-4" data-map-level="challenge" aria-label="ด่านท้าทาย"><span class="node-status"></span></button>
    <p class="map-hint">ผ่านด่านเพื่อรับดาว<br>และปลดล็อกเส้นทางถัดไป</p>
  </section>

  <section id="gameScreen" class="screen" aria-label="หน้าจอเกม">
    <video id="camera" class="camera" autoplay muted playsinline></video><div class="camera-cover"></div>
    <div id="gameStage" class="game-stage">
      <header class="hud"><div class="hud-panel stats"><span>จาน <b id="progress">0 / 2</b></span><span>⭐ <b id="score">0</b></span><span>⏱ <b id="timer">00:00</b></span></div><div class="hud-panel objective-panel"><div id="roundLabel" class="round-label">รอบที่ 1 / 10</div><div id="objective" class="objective">กำลังเตรียมโจทย์…</div></div><div class="hud-buttons"><button id="pauseBtn" class="icon-btn" aria-label="พักเกม">Ⅱ</button><button id="soundBtn" class="icon-btn" aria-label="เปิดหรือปิดเสียง">🔊</button><button id="backBtn" class="icon-btn" aria-label="กลับหน้าเลือกด่าน">⌂</button></div></header>
      <div id="cameraStatus" class="camera-status">กำลังเตรียมระบบตรวจจับมือ…</div>
      <div class="plate-wrap" id="plate"><span class="plate-count" id="plateCount">0 คำ</span><div class="plate-items" id="plateItems"></div></div>
      <div class="conveyor" id="conveyor"></div>
      <div class="hand-layer"><canvas id="handCanvas"></canvas></div><div id="pointer" class="pointer"></div><div id="feedback" class="feedback"></div>
    </div>
  </section>

  <section id="summaryScreen" class="screen summary"><div class="summary-card"><h1>ภารกิจสำเร็จ!</h1><div class="summary-score" id="finalScore">0 คะแนน</div><div class="result-grid"><div>ตอบถูก<b id="finalCorrect">0</b></div><div>ลองใหม่<b id="finalWrong">0</b></div><div>เวลาที่ใช้<b id="finalTime">00:00</b></div><div>ภารกิจ<b>10 รอบ</b></div></div><div id="rank" class="rank"></div><div class="modal-actions"><button class="big-btn" id="againBtn">↻ เล่นอีกครั้ง</button><button class="big-btn blue" id="summaryLevelsBtn">🏆 เลือกด่าน</button><button class="small-btn" id="homeBtn">⌂ หน้าหลัก</button></div></div></section>

  <div id="modalLayer" class="modal-layer" role="dialog" aria-modal="true"><div class="modal" id="modalContent"></div></div>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
  <script>
  (()=>{'use strict';
    const TRUE=[['กราบ','กร'],['กรอง','กร'],['กริ่ง','กร'],['กรอบ','กร'],['กรง','กร'],['กล้วย','กล'],['กล่อง','กล'],['กลาง','กล'],['กลิ้ง','กล'],['กล้า','กล'],['กวาง','กว'],['กวาด','กว'],['กว้าง','กว'],['กว่า','กว'],['ขวาน','ขว'],['ขว้าง','ขว'],['ขวา','ขว'],['ครู','คร'],['ครัว','คร'],['คลอง','คล'],['คลื่น','คล'],['คลาน','คล'],['ควาย','คว'],['ความ','คว'],['คว้า','คว'],['ปรับ','ปร'],['ปรุง','ปร'],['ปราบ','ปร'],['ปลา','ปล'],['ปลูก','ปล'],['ปลาย','ปล'],['พร้อม','พร'],['พริก','พร'],['พระ','พร'],['พลอย','พล'],['เพลง','พล'],['พลิก','พล'],['ตรง','ตร'],['ตรวจ','ตร'],['ตรอก','ตร'],['ตรา','ตร'],['แปรง','ปร'],['กวัก','กว'],['ครก','คร'],['ปลวก','ปล'],['พลั่ว','พล']].map(([word,cluster])=>({word,type:'true_cluster',cluster}));
    const FALSE=[['จริง','จร'],['สร้าง','สร'],['สร้อย','สร'],['ศรี','ศร'],['เศร้า','สร'],['เสริม','สร'],['ทราย','ทร'],['ทราบ','ทร'],['ทรัพย์','ทร'],['ทรง','ทร'],['ทรุด','ทร'],['พุทรา','ทร'],['อินทรี','ทร'],['นกอินทรี','ทร'],['แทรก','ทร'],['ทราม','ทร'],['โทรม','ทร'],['ทรัพยากร','ทร'],['ทรงผม','ทร'],['ศรัทธา','ศร'],['สระ','สร'],['สร่าง','สร'],['แทรง','ทร'],['ทรมาน','ทร']].map(([word,cluster])=>({word,type:'false_cluster',cluster}));
    const WORDS=[...TRUE,...FALSE]; const SKINS=['salmon','tuna','egg','shrimp','crab','maki','roe'];
    const el=id=>document.getElementById(id), screens=['homeScreen','levelScreen','gameScreen','summaryScreen'];
    const LEVEL_ORDER=['true','false','mix','challenge'];
    function loadProgress(){try{return {...{true:0,false:0,mix:0,challenge:0},...JSON.parse(localStorage.getItem('arSushiProgress')||'{}')};}catch(_){return {true:0,false:0,mix:0,challenge:0};}}
    function saveProgress(){try{localStorage.setItem('arSushiProgress',JSON.stringify(state.progress));}catch(_){}}
    const state={level:'true',round:0,score:0,correct:0,wrong:0,possible:0,target:2,filter:null,items:[],grabbed:null,placed:[],running:false,paused:false,cameraReady:false,usingMouse:false,stream:null,hands:null,raf:0,timerRaf:0,lastFrame:0,elapsed:0,pinchStarted:0,pinch:false,cooldown:0,pointer:{x:.5,y:.5,seen:false},smooth:null,sound:true,audio:null,progress:loadProgress()};
    const video=el('camera'), stage=el('gameStage'), conveyor=el('conveyor'), plate=el('plate'), canvas=el('handCanvas'), ctx=canvas.getContext('2d'), pointer=el('pointer');
    const showScreen=id=>{screens.forEach(s=>el(s).classList.toggle('active',s===id));};
    const modal=(html)=>{el('modalContent').innerHTML=html;el('modalLayer').classList.add('show');}; const closeModal=()=>el('modalLayer').classList.remove('show');
    function home(){stopCamera();stopGame();closeModal();showScreen('homeScreen');}
    function renderLevelMap(){document.querySelectorAll('[data-map-level]').forEach(node=>{const level=node.dataset.mapLevel,index=LEVEL_ORDER.indexOf(level),unlocked=index===0||state.progress[LEVEL_ORDER[index-1]]>0,stars=state.progress[level]||0;node.disabled=!unlocked;node.classList.toggle('locked',!unlocked);node.querySelector('.node-status').textContent=!unlocked?'🔒':stars?'⭐'.repeat(stars):'▶ เริ่ม';});}
    function showLevelMap(){closeModal();showScreen('levelScreen');renderLevelMap();}
    function levelModal(){showLevelMap();}
    function howModal(){modal(`<h2>วิธีเล่น</h2><ol class="how-list"><li>กด <b>เริ่มเกม</b> และอนุญาตให้ใช้กล้อง</li><li>ยกมือให้กล้องเห็น แล้วจีบนิ้วชี้กับนิ้วโป้งค้างสั้น ๆ เพื่อคีบซูชิ</li><li>พาซูชิไปกลางจาน แล้วคลายนิ้วเพื่อวาง</li><li>อ่านโจทย์ด้านบน เลือกคำที่ถูกต้องให้ครบ</li><li>ทำภารกิจให้ครบ 10 รอบ</li></ol><p>กล้องใช้ตรวจจับมือบนอุปกรณ์นี้เท่านั้น ไม่มีการบันทึกหรือส่งภาพออกไป</p><div class="modal-actions"><button id="closeHow" class="big-btn">เข้าใจแล้ว</button></div>`);el('closeHow').onclick=closeModal;}
    function permissionModal(level){startSelectedLevel(level);}
    function setStatus(message,hide=false){const s=el('cameraStatus');s.textContent=message;s.classList.toggle('hidden',hide);}
    async function startSelectedLevel(level){state.level=level;state.usingMouse=false;showScreen('gameScreen');setStatus('กำลังเปิดกล้องและเตรียมระบบตรวจจับมือ…');if(state.stream&&state.hands){state.cameraReady=true;beginGame();return;}await requestCamera();}
    async function requestCamera(){try{if(!navigator.mediaDevices?.getUserMedia)throw new Error('เบราว์เซอร์นี้ไม่รองรับกล้อง');if(!window.isSecureContext)throw new Error('ต้องเปิดผ่าน HTTPS หรือ localhost เพื่อใช้กล้อง');state.stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'user',width:{ideal:1280},height:{ideal:720}},audio:false});video.srcObject=state.stream;await video.play();await initHands();state.cameraReady=true;beginGame();}catch(err){console.warn(err);showLevelMap();modal(`<h2>เปิดกล้องไม่สำเร็จ</h2><p>กรุณาอนุญาตให้เว็บไซต์ใช้กล้อง และเปิดเกมผ่าน HTTPS หรือ localhost</p><p class="notice">${err.message||'ลองใหม่อีกครั้ง'}</p><div class="modal-actions"><button id="retryCamera" class="big-btn">ลองเปิดกล้องอีกครั้ง</button><button id="backToMap" class="small-btn">กลับแผนที่ด่าน</button></div>`);el('retryCamera').onclick=()=>{closeModal();startSelectedLevel(state.level);};el('backToMap').onclick=closeModal;}}
    async function initHands(){if(state.hands)return;if(typeof Hands==='undefined')throw new Error('โหลด MediaPipe ไม่สำเร็จ โปรดตรวจอินเทอร์เน็ตแล้วลองใหม่');state.hands=new Hands({locateFile:f=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`});state.hands.setOptions({maxNumHands:1,modelComplexity:0,minDetectionConfidence:.6,minTrackingConfidence:.6,selfieMode:true});state.hands.onResults(onHandResults);}
    function beginGame(){showScreen('gameScreen');resetStats();state.running=true;state.paused=false;state.startAt=performance.now();setStatus(state.usingMouse?'โหมดฝึก: ใช้เมาส์ลากซูชิไปยังจาน':'ยกมือขึ้นและจีบนิ้วชี้กับนิ้วโป้งเพื่อจับซูชิ');nextRound();if(!state.usingMouse)detectLoop();startTimer();}
    function resetStats(){Object.assign(state,{round:0,score:0,correct:0,wrong:0,possible:0,target:2,filter:null,items:[],grabbed:null,placed:[],elapsed:0,pinch:false,pinchStarted:0,cooldown:0,lastFrame:performance.now()});el('score').textContent='0';el('timer').textContent='00:00';}
    function targetForLevel(){if(state.level==='challenge')return 3+Math.floor(Math.random()*3);return state.level==='mix'?2+Math.floor(Math.random()*2):2;}
    function makeFilter(){const trueOnly=state.level==='true'||(state.level==='mix'||state.level==='challenge')&&Math.random()<.5;const type=trueOnly?'true_cluster':'false_cluster';const label=type==='true_cluster'?'คำควบกล้ำแท้':'คำควบกล้ำไม่แท้';const prompts=[`คีบ${label}ลงจานให้ครบ ${state.target} คำ`,`ช่วยเลือก${label} ${state.target} คำ`,`ตามหา${label}แล้ววางบนจาน ${state.target} คำ`];return {type,cluster:null,description:prompts[Math.floor(Math.random()*prompts.length)]};}
    function matches(word){return word.type===state.filter.type&&(!state.filter.cluster||word.cluster===state.filter.cluster);}
    const shuffled=a=>{const x=[...a];for(let i=x.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[x[i],x[j]]=[x[j],x[i]];}return x;};
    function nextRound(){state.round++;if(state.round>10){finishGame();return;}state.target=targetForLevel();state.possible+=state.target;state.filter=makeFilter();state.placed=[];state.grabbed=null;clearItems();el('roundLabel').textContent=`รอบที่ ${state.round} / 10`;el('objective').textContent=state.filter.description;el('progress').textContent=`0 / ${state.target}`;renderPlate();const total=state.level==='challenge'?8:7;const goodCount=Math.min(total-2,Math.max(state.target+2,4));const good=shuffled(WORDS.filter(matches)).slice(0,goodCount);const bad=shuffled(WORDS.filter(w=>!matches(w))).slice(0,total-good.length);const deck=shuffled([...good,...bad]);const positions=total===8?[-10,6,22,38,54,70,86,102]:[-10,8,26,44,62,80,98];state.items=deck.map((word,i)=>({id:`${Date.now()}-${i}`,word,isTarget:matches(word),x:positions[i],speed:.78,skin:SKINS[Math.floor(Math.random()*SKINS.length)],moving:true,el:null}));state.items.forEach(addItem);feedback('เตรียมตัว!',false);}
    function addItem(item){const node=document.createElement('div');node.className='sushi-item';node.dataset.id=item.id;node.innerHTML=`<div class="word-tag">${item.word.word}</div><div class="sushi ${item.skin}"></div>`;stage.appendChild(node);item.el=node;placeItem(item);}
    function clearItems(){state.items.forEach(i=>i.el?.remove());state.items=[];}
    function placeItem(i){if(!i.el||i===state.grabbed)return;i.el.style.left=i.x+'%';i.el.style.bottom='clamp(18px,4vh,38px)';i.el.style.top='';}
    function renderPlate(){el('plateCount').textContent=`${state.placed.length} คำ`;el('plateItems').innerHTML=state.placed.map(p=>`<div class="plate-mini" title="${p.word}"><div class="sushi ${p.skin}"></div><span>${p.word}</span></div>`).join('');}
    function updateItems(now){if(!state.running||state.paused)return;const dt=Math.min(40,now-state.lastFrame);state.lastFrame=now;const width=Math.max(stage.clientWidth,1);state.items.forEach(i=>{if(i.moving&&i!==state.grabbed){i.x-=i.speed*dt/1000*100/width*100;i.el.style.left=i.x+'%';if(i.x<-18){const pool=shuffled(WORDS.filter(w=>(i.isTarget?matches(w):!matches(w))&&!state.items.some(other=>other!==i&&other.word.word===w.word)));i.word=pool[0];i.isTarget=matches(i.word);i.skin=SKINS[Math.floor(Math.random()*SKINS.length)];i.x=110;i.el.querySelector('.word-tag').textContent=i.word.word;i.el.querySelector('.sushi').className='sushi '+i.skin;}}});}
    function loop(now){updateItems(now);if(state.running){state.raf=requestAnimationFrame(loop);}}
    function startTimer(){cancelAnimationFrame(state.raf);cancelAnimationFrame(state.timerRaf);state.lastFrame=performance.now();state.raf=requestAnimationFrame(loop);state.timerRaf=requestAnimationFrame(timerLoop);}
    function stopGame(){state.running=false;cancelAnimationFrame(state.raf);cancelAnimationFrame(state.timerRaf);clearItems();}
    function formatTime(ms){const secs=Math.floor(ms/1000);return String(Math.floor(secs/60)).padStart(2,'0')+':'+String(secs%60).padStart(2,'0');}
    function timerLoop(){if(state.running&&!state.paused){state.elapsed=performance.now()-state.startAt;el('timer').textContent=formatTime(state.elapsed);}if(state.running)state.timerRaf=requestAnimationFrame(timerLoop);}
    function togglePause(){if(!state.running)return;state.paused=!state.paused;if(state.paused){state.pauseAt=performance.now();setStatus('เกมพักอยู่ — กดปุ่ม Ⅱ เพื่อเล่นต่อ');el('pauseBtn').textContent='▶';}else{state.startAt+=performance.now()-state.pauseAt;setStatus(state.usingMouse?'โหมดฝึก: ใช้เมาส์ลากซูชิไปยังจาน':'ยกมือขึ้นและจีบนิ้วชี้กับนิ้วโป้งเพื่อจับซูชิ',false);el('pauseBtn').textContent='Ⅱ';}}
    function feedback(text,bad){const f=el('feedback');f.textContent=text;f.className='feedback '+(bad?'bad ':'')+'show';setTimeout(()=>f.className='feedback '+(bad?'bad':''),1100);}
    function playTone(type){if(!state.sound)return;try{state.audio??=new (window.AudioContext||window.webkitAudioContext)();const osc=state.audio.createOscillator(),gain=state.audio.createGain();const presets={pick:[440,.05],drop:[620,.07],good:[784,.12],bad:[190,.12],round:[660,.16],end:[880,.22]};const [freq,dur]=presets[type]||presets.pick;osc.frequency.value=freq;osc.type=type==='bad'?'sawtooth':'sine';gain.gain.setValueAtTime(.0001,state.audio.currentTime);gain.gain.exponentialRampToValueAtTime(.09,state.audio.currentTime+.01);gain.gain.exponentialRampToValueAtTime(.0001,state.audio.currentTime+dur);osc.connect(gain).connect(state.audio.destination);osc.start();osc.stop(state.audio.currentTime+dur+.02);}catch(_){}}
    function updatePointer(x,y,isPinch){state.pointer={x,y,seen:true};const w=stage.clientWidth,h=stage.clientHeight;pointer.style.display='block';pointer.style.left=(x*w)+'px';pointer.style.top=(y*h)+'px';pointer.classList.toggle('pinch',isPinch);if(isPinch){if(!state.pinch){state.pinch=true;state.pinchStarted=performance.now();}if(!state.grabbed&&performance.now()-state.pinchStarted>185&&performance.now()>state.cooldown)pickAt(x*w,y*h);if(state.grabbed)moveGrabbed(x*w,y*h);}else if(state.pinch){state.pinch=false;state.pinchStarted=0;if(state.grabbed)dropGrabbed();}}
    function pickAt(x,y){const ordered=[...state.items].reverse();const item=ordered.find(i=>{if(!i.moving)return false;const r=i.el.getBoundingClientRect(),s=stage.getBoundingClientRect();return x>=r.left-s.left-22&&x<=r.right-s.left+22&&y>=r.top-s.top-22&&y<=r.bottom-s.top+22;});if(!item)return;state.grabbed=item;item.moving=false;item.el.classList.add('grabbed');item.el.style.bottom='auto';playTone('pick');}
    function moveGrabbed(x,y){const i=state.grabbed;if(!i)return;i.el.style.left=(x-i.el.offsetWidth/2)+'px';i.el.style.top=(y-i.el.offsetHeight/2)+'px';}
    function dropGrabbed(){const i=state.grabbed;if(!i)return;const ir=i.el.getBoundingClientRect(),pr=plate.getBoundingClientRect();const centerX=ir.left+ir.width/2,centerY=ir.top+ir.height/2;state.grabbed=null;state.cooldown=performance.now()+420;i.el.classList.remove('grabbed');if(centerX>pr.left&&centerX<pr.right&&centerY>pr.top&&centerY<pr.bottom){if(matches(i.word)){state.placed.push({word:i.word.word,skin:i.skin});state.score++;state.correct++;el('score').textContent=state.score;el('progress').textContent=`${state.placed.length} / ${state.target}`;renderPlate();i.el.remove();state.items=state.items.filter(x=>x!==i);feedback('ถูกต้อง! +1',false);playTone('good');if(state.placed.length===state.target){state.paused=true;feedback('เยี่ยมมาก! เตรียมโจทย์ต่อไป',false);playTone('round');setTimeout(()=>{if(state.running){state.paused=false;nextRound();}},1050);}}else{state.wrong++;feedback('ลองใหม่อีกครั้ง',true);playTone('bad');resetItem(i);}}else{resetItem(i);} }
    function resetItem(i){i.moving=true;i.x=108;i.el.style.top='';i.el.style.bottom='clamp(18px,4vh,38px)';i.el.style.left=i.x+'%';}
    function cancelGrabbed(){const i=state.grabbed;if(!i)return;state.grabbed=null;state.pinch=false;state.pinchStarted=0;i.el.classList.remove('grabbed');resetItem(i);}
    function drawHand(landmarks){const rect=canvas.getBoundingClientRect(),dpr=window.devicePixelRatio||1;if(canvas.width!==Math.floor(rect.width*dpr)||canvas.height!==Math.floor(rect.height*dpr)){canvas.width=Math.floor(rect.width*dpr);canvas.height=Math.floor(rect.height*dpr);ctx.setTransform(dpr,0,0,dpr,0,0);}ctx.clearRect(0,0,rect.width,rect.height);const pts=landmarks.map(p=>({x:p.x*rect.width,y:p.y*rect.height}));const links=[[0,1],[1,2],[2,3],[3,4],[0,5],[5,6],[6,7],[7,8],[5,9],[9,10],[10,11],[11,12],[9,13],[13,14],[14,15],[15,16],[13,17],[0,17],[17,18],[18,19],[19,20]];ctx.strokeStyle='#ffdb52';ctx.lineWidth=3;ctx.shadowColor='#ee3d47';ctx.shadowBlur=9;links.forEach(([a,b])=>{ctx.beginPath();ctx.moveTo(pts[a].x,pts[a].y);ctx.lineTo(pts[b].x,pts[b].y);ctx.stroke();});const pinchDistance=Math.hypot(pts[8].x-pts[4].x,pts[8].y-pts[4].y);if(pinchDistance<rect.width*.13){ctx.save();ctx.strokeStyle='#fff36b';ctx.lineWidth=4;ctx.shadowColor='#ffb52a';ctx.shadowBlur=18;ctx.setLineDash([6,5]);ctx.beginPath();ctx.moveTo(pts[4].x,pts[4].y);ctx.lineTo(pts[8].x,pts[8].y);ctx.stroke();ctx.restore();}pts.forEach((p,i)=>{const tip=i===4||i===8;ctx.save();ctx.fillStyle=tip?'#fff267':'#ed4650';ctx.shadowColor=tip?'#fff04c':'#ee3d47';ctx.shadowBlur=tip?22:4;ctx.beginPath();ctx.arc(p.x,p.y,tip?9:3.5,0,Math.PI*2);ctx.fill();ctx.restore();});}
    function onHandResults(results){if(!state.running||state.paused)return;const lm=results.multiHandLandmarks?.[0];if(!lm){ctx.clearRect(0,0,canvas.width,canvas.height);pointer.style.display='none';state.smooth=null;cancelGrabbed();return;}drawHand(lm);const rawX=(lm[8].x+lm[4].x)/2,rawY=(lm[8].y+lm[4].y)/2;state.smooth??={x:rawX,y:rawY};state.smooth.x+=.32*(rawX-state.smooth.x);state.smooth.y+=.32*(rawY-state.smooth.y);const dx=lm[8].x-lm[4].x,dy=lm[8].y-lm[4].y;const pinched=Math.hypot(dx,dy)<.075;updatePointer(state.smooth.x,state.smooth.y,pinched);}
    async function detectLoop(){if(!state.running||state.usingMouse||!state.hands)return;try{if(video.readyState>=2)await state.hands.send({image:video});}catch(err){console.warn('Hand detection error',err);setStatus('ระบบตรวจจับมือขัดข้อง โปรดลองเปิดกล้องอีกครั้ง');}requestAnimationFrame(detectLoop);}
    function stopCamera(){if(state.stream){state.stream.getTracks().forEach(t=>t.stop());state.stream=null;}video.srcObject=null;state.cameraReady=false;state.hands=null;ctx.clearRect(0,0,canvas.width,canvas.height);pointer.style.display='none';}
    function finishGame(){state.running=false;cancelAnimationFrame(state.raf);cancelAnimationFrame(state.timerRaf);state.elapsed=performance.now()-state.startAt;clearItems();playTone('end');el('finalScore').textContent=`${state.score} คะแนน`;el('finalCorrect').textContent=state.correct;el('finalWrong').textContent=state.wrong;el('finalTime').textContent=formatTime(state.elapsed);const pct=state.possible?Math.round(state.score/state.possible*100):0;const stars=pct>=90?3:pct>=70?2:1;state.progress[state.level]=Math.max(state.progress[state.level]||0,stars);saveProgress();let rank=pct>=90?'เชฟซูชิคำควบกล้ำระดับยอดเยี่ยม':pct>=70?'เชฟซูชิฝีมือดี':pct>=50?'เชฟฝึกหัด':'ฝึกอีกนิด แล้วลองใหม่';el('rank').textContent=`${rank} (${pct}%) · รับ ${'⭐'.repeat(stars)}`;showScreen('summaryScreen');}
    stage.addEventListener('mousedown',e=>{if(!state.running||!state.usingMouse||state.paused)return;const r=stage.getBoundingClientRect();updatePointer((e.clientX-r.left)/r.width,(e.clientY-r.top)/r.height,true);});stage.addEventListener('mousemove',e=>{if(!state.running||!state.usingMouse||!state.pinch)return;const r=stage.getBoundingClientRect();updatePointer((e.clientX-r.left)/r.width,(e.clientY-r.top)/r.height,true);});window.addEventListener('mouseup',()=>{if(state.usingMouse&&state.pinch)updatePointer(state.pointer.x,state.pointer.y,false);});window.addEventListener('resize',()=>{ctx.clearRect(0,0,canvas.width,canvas.height);});
    el('startBtn').onclick=showLevelMap;el('levelsBtn').onclick=showLevelMap;el('howBtn').onclick=howModal;el('mapBackBtn').onclick=home;document.querySelectorAll('[data-map-level]').forEach(node=>node.onclick=()=>startSelectedLevel(node.dataset.mapLevel));el('pauseBtn').onclick=togglePause;el('soundBtn').onclick=()=>{state.sound=!state.sound;el('soundBtn').textContent=state.sound?'🔊':'🔇';};el('backBtn').onclick=()=>{stopCamera();stopGame();showLevelMap();};el('againBtn').onclick=()=>startSelectedLevel(state.level);el('summaryLevelsBtn').onclick=showLevelMap;el('homeBtn').onclick=home;
  })();
  </script>
